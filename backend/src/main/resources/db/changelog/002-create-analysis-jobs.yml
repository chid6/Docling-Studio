databaseChangeLog:
  - changeSet:
      id: 002-create-analysis-jobs
      author: docling-studio
      changes:
        - createTable:
            tableName: analysis_jobs
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
              - column:
                  name: document_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_analysis_document
                    references: documents(id)
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: content_markdown
                  type: text
              - column:
                  name: content_html
                  type: text
              - column:
                  name: pages_json
                  type: text
              - column:
                  name: error_message
                  type: text
              - column:
                  name: started_at
                  type: timestamp
              - column:
                  name: completed_at
                  type: timestamp
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: NOW()

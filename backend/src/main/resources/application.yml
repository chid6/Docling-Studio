server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/docling_studio
    username: app
    password: app
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  document-parser:
    base-url: http://localhost:8000
  storage:
    path: ./uploads
